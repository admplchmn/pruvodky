{% extends "base.html" %}

{% block title %}Upravit šablonu - Generátor průvodek{% endblock %}

{% block content %}
<div class="card" style="max-width: 700px;">
    <div class="card-header">Upravit šablonu: {{ template.name }}</div>

    <form method="POST" action="{{ url_for('edit_template', tpl_id=template.id) }}">
        <div class="form-group">
            <label for="name">Název šablony *</label>
            <input type="text" id="name" name="name" class="form-control" required
                   value="{{ template.name }}">
        </div>

        <div class="form-group">
            <label for="template_type">Typ šablony</label>
            <input type="text" id="template_type" value="{{ template.template_type }}" class="form-control" disabled>
            <small style="color: #7f8c8d;">Typ nelze změnit po vytvoření.</small>
        </div>

        <div class="form-group">
            <label for="content_json">Parametry šablony (JSON)</label>
            <textarea id="content_json" name="content_json" class="form-control" rows="10">{{ template.content_json or '' }}</textarea>
        </div>

        <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
            <button type="submit" class="btn btn-primary">Uložit změny</button>
            <a href="{{ url_for('sablony') }}" class="btn btn-secondary">Zpět</a>
        </div>
    </form>
</div>
{% endblock %}
