{% extends "base.html" %}

{% block title %}Změna hesla - Generátor průvodek{% endblock %}

{% block content %}
<div class="card" style="max-width: 500px;">
    <div class="card-header">Změna hesla</div>

    <form method="POST" action="{{ url_for('change_password') }}">
        <div class="form-group">
            <label for="current_password">Současné heslo</label>
            <input type="password" id="current_password" name="current_password" class="form-control" required>
        </div>

        <div class="form-group">
            <label for="new_password">Nové heslo (alespoň 6 znaků)</label>
            <input type="password" id="new_password" name="new_password" class="form-control" required minlength="6">
        </div>

        <div class="form-group">
            <label for="confirm_password">Potvrzení nového hesla</label>
            <input type="password" id="confirm_password" name="confirm_password" class="form-control" required>
        </div>

        <div style="display: flex; gap: 1rem;">
            <button type="submit" class="btn btn-primary">Změnit heslo</button>
            <a href="{{ url_for('profile') }}" class="btn btn-secondary">Zpět</a>
        </div>
    </form>
</div>
{% endblock %}
