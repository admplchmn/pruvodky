{% extends "base.html" %}

{% block title %}Průvodka Svařovna - Generátor průvodek{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">Generování průvodky - Svařovna</div>

    <form method="POST" action="{{ url_for('pruvodka_svarovna') }}">
        <div class="form-row">
            <div class="form-group">
                <label for="stroj">Stroj *</label>
                <input type="text" id="stroj" name="stroj" class="form-control" required
                       value="{{ request.form.stroj if request.form.stroj else '' }}">
            </div>

            <div class="form-group">
                <label for="category">Kategorie *</label>
                <select id="category" name="category" class="form-control" required>
                    <option value="">-- Vyberte kategorii --</option>
                    {% for cat in categories %}
                    <option value="{{ cat }}" {% if request.form.category == cat %}selected{% endif %}>{{ cat }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="vyrobni">Výrobní číslo / kooperace *</label>
                <input type="text" id="vyrobni" name="vyrobni" class="form-control" required
                       value="{{ request.form.vyrobni if request.form.vyrobni else '' }}">
            </div>

            <div class="form-group">
                <label for="datum">Datum *</label>
                <input type="date" id="datum" name="datum" class="form-control" required
                       value="{{ request.form.datum if request.form.datum else '' }}">
            </div>
        </div>

        <div class="form-group">
            <label for="jmeno">Jméno a příjmení *</label>
            <input type="text" id="jmeno" name="jmeno" class="form-control" required
                   value="{{ request.form.jmeno if request.form.jmeno else '' }}">
            <small style="color: #7f8c8d;">Předvyplněno z vašeho profilu</small>
        </div>

        <div class="form-group">
            <label>Výrobní operace pro vybranou kategorii:</label>
            <div id="operations-list" style="background: #f8f9fa; padding: 1rem; border-radius: 4px; min-height: 100px;">
                <p style="color: #7f8c8d;">Vyberte kategorii pro zobrazení operací.</p>
            </div>
        </div>

        <div style="margin-top: 1.5rem; display: flex; gap: 1rem;">
            <button type="submit" class="btn btn-success">Vygenerovat PDF</button>
            <a href="{{ url_for('index') }}" class="btn btn-secondary">Zpět</a>
        </div>
    </form>
</div>

<script>
    // Seznam operací pro každou kategorii
    const operations = {
        "SP, A": ["Kostra", "Bočnice kostry", "Agregát", "Oplechování kostry", "Sváření oplechování", "Stůl", "Příslušenství"],
        "R, SR": ["Kostra", "Agregát", "Oplechování kostry", "Sváření oplechování", "Stoly", "Příslušenství"],
        "SC": ["Kostra", "Agregát", "Oplechování kostry", "Sváření oplechování", "Stoly", "Bočnice kostry", "Příslušenství"],
        "TWINGO": ["Kostra", "Agregáty", "Oplechování kostry", "Sváření oplechování", "Stůl", "Příslušenství"],
        "CNC": ["Spodní podstavec", "Sloupy", "Portál", "Oplechování", "Saně", "Smykadlo", "Zásobník", "Odsávání", "Kabina", "Ovládací pult"],
        "F250": ["Kostra", "Agregát", "Oplechování kostry", "Sváření oplechování", "Stůl", "Kryt vřetene", "Příslušenství"],
        "SF": ["Kostra", "Agregát", "Oplechování kostry", "Sváření oplechování", "Stůl", "Kryt vřetene", "Příslušenství"],
        "Agregáty SPB": ["Agregát"],
        "B3, B5, JSM": ["Kostra", "Bočnice kostry", "Oplechování kostry", "Sváření oplechování", "Stůl", "Oplechování stolu", "Příslušenství", "Vývěva", "Ometáky"],
        "B7": ["Horní rám", "Oplechování kostry", "Sváření oplechování", "Stůl", "Oplechování stolu", "Příslušenství", "Spodní rám", "Vývěva", "Ometáky"],
        "Final": ["Kostra", "Oplechování kostry", "Sváření oplechování", "Stůl", "Oplechování stolu", "Příslušenství", "Sváření bočnice", "Agregáty", "Vývěva", "Ometáky"],
        "Pony": ["Kostra", "Bočnice kostry", "Oplechování kostry", "Sváření oplechování", "Stůl", "Oplechování stolu", "Příslušenství"],
        "Cindy": ["Kostra", "Oplechování kostry", "Sváření oplechování", "Stůl", "Oplechování stolu", "Příslušenství", "Agregát"],
        "Duplex": ["Horní rám", "Oplechování zadní kostry", "Sváření oplechování", "Stůl", "Oplechování stolu", "Příslušenství", "Spodní rám", "Zadní kostra", "Oplechování přední kostry", "Vývěva", "Ometáky"],
        "VD20, VD26": ["Kostra", "Pojezdové stolky", "Oplechování", "Stůl", "Příslušenství"],
        "Basset, Husky, PBB": ["Kostra", "Oplechování", "Stůl", "Příslušenství", "Bočnice kostry", "Vrchní sklopný stůl"],
        "Fox, PBM": ["Kostra", "Oplechování", "Stůl", "Příslušenství", "Bočnice kostry", "Příčník", "Rotační stůl + stojan"],
        "HB1000, HBK3200": ["Kostra", "Oplechování", "Stůl / stoly", "Příslušenství", "Agregát"]
    };

    document.addEventListener('DOMContentLoaded', function() {
        const categorySelect = document.getElementById('category');
        const operationsList = document.getElementById('operations-list');

        // Zobrazit operace při změně kategorie
        categorySelect.addEventListener('change', function() {
            const selectedCategory = this.value;
            const ops = operations[selectedCategory] || [];

            if (ops.length > 0) {
                operationsList.innerHTML = '<ul style="list-style: none; padding: 0;">' +
                    ops.map(op => '<li style="padding: 0.25rem 0; border-bottom: 1px solid #eee;">' + op + '</li>').join('') +
                    '</ul>';
            } else {
                operationsList.innerHTML = '<p style="color: #7f8c8d;">Vyberte kategorii pro zobrazení operací.</p>';
            }
        });

        // Pokud je již kategorie vybrána (při odeslání formuláře s chybou), zobrazit operace
        if (categorySelect.value) {
            categorySelect.dispatchEvent(new Event('change'));
        }

        // Nastavení dnešního data
        const datumInput = document.getElementById('datum');
        if (!datumInput.value) {
            const today = new Date();
            const day = String(today.getDate()).padStart(2, '0');
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const year = today.getFullYear();
            datumInput.value = `${day}.${month}.${year}`;
        }
    });
</script>
{% endblock %}
